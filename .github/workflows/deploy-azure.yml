# CD: se ejecuta en cada push a main (merge desde develop).
# 1) Construye las imágenes y las publica en GitHub Container Registry (ghcr.io).
# 2) Actualiza los App Services de Azure para que usen la nueva imagen.
#
# Secrets necesarios en GitHub (Settings → Secrets and variables → Actions):
#   AZURE_CREDENTIALS  → salida de:
#     az ad sp create-for-rbac --name fantasy-ci --role contributor \
#       --scopes /subscriptions/<SUB_ID>/resourceGroups/<RG> --json-auth
# Variables necesarias (pestaña Variables):
#   AZURE_RG           → nombre del resource group (ej. rg-fantasy)
#   AZURE_APP_BACK     → nombre del App Service del backend (ej. fantasy-back-danyl)
#   AZURE_APP_FRONT    → nombre del App Service del frontend (ej. fantasy-front-danyl)
name: CD — Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Publicar imágenes en GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_back: ${{ steps.meta.outputs.image_back }}
      image_front: ${{ steps.meta.outputs.image_front }}
    steps:
      - uses: actions/checkout@v4

      - name: Login a GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Nombres de imagen (en minúsculas)
        id: meta
        run: |
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image_back=$REPO-back:latest" >> "$GITHUB_OUTPUT"
          echo "image_front=$REPO-front:latest" >> "$GITHUB_OUTPUT"

      - name: Build y push backend
        run: |
          docker build -t "${{ steps.meta.outputs.image_back }}" ./backend
          docker push "${{ steps.meta.outputs.image_back }}"

      - name: Build y push frontend
        run: |
          docker build -t "${{ steps.meta.outputs.image_front }}" ./frontend
          docker push "${{ steps.meta.outputs.image_front }}"

  deploy:
    name: Desplegar en Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Login a Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Actualizar backend
        run: |
          az webapp config container set \
            --resource-group "${{ vars.AZURE_RG }}" \
            --name "${{ vars.AZURE_APP_BACK }}" \
            --container-image-name "${{ needs.build-and-push.outputs.image_back }}"
          az webapp restart --resource-group "${{ vars.AZURE_RG }}" --name "${{ vars.AZURE_APP_BACK }}"

      - name: Actualizar frontend
        run: |
          az webapp config container set \
            --resource-group "${{ vars.AZURE_RG }}" \
            --name "${{ vars.AZURE_APP_FRONT }}" \
            --container-image-name "${{ needs.build-and-push.outputs.image_front }}"
          az webapp restart --resource-group "${{ vars.AZURE_RG }}" --name "${{ vars.AZURE_APP_FRONT }}"
