# CI: se ejecuta en cada Pull Request y en cada push a develop.
# Valida que el proyecto compila y que las imágenes Docker se construyen.
#
# Runner: los PRs (incluidos forks de cualquier desconocido, porque el repo es
# público) corren en el runner de GitHub (ubuntu-latest) — aislado y desechable.
# Los push a develop/main SOLO los pueden disparar los colaboradores con acceso
# de escritura, así que esos sí corren en el self-hosted runner (esta laptop).
# No metas self-hosted en el trigger de pull_request: cualquiera podría abrir
# un PR con un workflow modificado y ejecutar código en esta máquina.
name: CI

on:
  pull_request:
  push:
    branches: [develop]

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ${{ github.event_name == 'push' && 'self-hosted' || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  backend:
    name: Backend (typecheck + build)
    runs-on: ${{ github.event_name == 'push' && 'self-hosted' || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  docker:
    name: Imágenes Docker
    runs-on: ${{ github.event_name == 'push' && 'self-hosted' || 'ubuntu-latest' }}
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t fantasy-back ./backend
      - run: docker build -t fantasy-front ./frontend
