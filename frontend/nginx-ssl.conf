# Variante con HTTPS para el BONUS de certificado (+1).
# Se monta con docker-compose.ssl.yml; espera el cert en /etc/nginx/certs/.
server {
  listen 80;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  ssl_certificate /etc/nginx/certs/fantasy.crt;
  ssl_certificate_key /etc/nginx/certs/fantasy.key;

  location /api/ {
    proxy_pass ${BACKEND_URL};
    proxy_ssl_server_name on;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }
}
