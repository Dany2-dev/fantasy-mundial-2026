# Plantilla de nginx: ${BACKEND_URL} se sustituye al arrancar el contenedor
# (en compose local = http://backend:4000; en Azure = https://<app-back>.azurewebsites.net)
server {
  listen 80;

  location /api/ {
    proxy_pass ${BACKEND_URL};
    proxy_ssl_server_name on;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }
}
